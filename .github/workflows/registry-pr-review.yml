name: Codex Registry Review

on:
  pull_request:
    paths:
      - "sources.txt"
      - "scripts/check-registry-safety.mjs"
      - ".github/workflows/registry-pr-review.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run registry safety review
        run: |
          node scripts/check-registry-safety.mjs \
            --json-out "$RUNNER_TEMP/registry-review.json" \
            --markdown-out "$RUNNER_TEMP/registry-review.md"

      - name: Update pull request comment
        uses: actions/github-script@v7
        env:
          REVIEW_JSON_PATH: ${{ runner.temp }}/registry-review.json
          REVIEW_MARKDOWN_PATH: ${{ runner.temp }}/registry-review.md
        with:
          script: |
            const fs = require('node:fs');
            const report = JSON.parse(fs.readFileSync(process.env.REVIEW_JSON_PATH, 'utf8'));
            const markdown = fs.readFileSync(process.env.REVIEW_MARKDOWN_PATH, 'utf8');
            const marker = '<!-- llms2md-registry-review -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: markdown,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: markdown,
              });
            }

            if (report.counts.unsafe > 0) {
              core.setFailed('Unsafe registry URLs were detected.');
            }
